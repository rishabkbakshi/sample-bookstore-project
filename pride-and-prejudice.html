<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pride and Prejudice | Jayati's Bookstore</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<header><h1>📚 Jayati's Bookstore</h1></header>

<main class="book-detail">

    <div class="book-cover">
        <img src="images/pride.jpg" alt="Pride and Prejudice">
    </div>

    <div class="book-info">
        <h2>Pride and Prejudice</h2>
        <p class="author">by Jane Austen</p>

        <div class="rating">★★★★★ 4.6/5</div>
        <p class="price">$11.99</p>

        <table class="book-meta">
            <tr><td>Genre</td><td>Romance</td></tr>
            <tr><td>Pages</td><td>279</td></tr>
            <tr><td>Language</td><td>English</td></tr>
            <tr><td>Publisher</td><td>T. Egerton</td></tr>
            <tr><td>ISBN</td><td>9780141439518</td></tr>
        </table>

        <button class="buy-btn">Add to Cart</button>
    </div>

</main>

<section class="description">
    <h3>Description</h3>
    <p>
        A witty romance following Elizabeth Bennet and Mr. Darcy as they overcome pride and misunderstanding.
    </p>
</section>

</body>
</html>
