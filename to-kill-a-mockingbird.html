<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>To Kill a Mockingbird | Jayati's Bookstore</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<header>
    <h1>📚 Jayati's Bookstore</h1>
</header>

<main class="book-detail">

    <div class="book-cover">
        <img src="images/mockingbird.jpg" alt="To Kill a Mockingbird">
    </div>

    <div class="book-info">
        <h2>To Kill a Mockingbird</h2>
        <p class="author">by Harper Lee</p>

        <div class="rating">★★★★★ 4.8/5</div>
        <p class="price">$14.99</p>

        <table class="book-meta">
            <tr><td>Genre</td><td>Classic Fiction</td></tr>
            <tr><td>Pages</td><td>281</td></tr>
            <tr><td>Language</td><td>English</td></tr>
            <tr><td>Publisher</td><td>J.B. Lippincott & Co.</td></tr>
            <tr><td>ISBN</td><td>9780061120084</td></tr>
        </table>

        <button class="buy-btn">Add to Cart</button>
    </div>

</main>

<section class="description">
    <h3>Description</h3>
    <p>
        A powerful story about racial injustice in the American South told through the eyes of young Scout Finch.
    </p>
</section>

</body>
</html>
